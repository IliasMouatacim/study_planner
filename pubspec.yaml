name: study_planner_pomodoro
description: A Study Planner and Pomodoro Timer application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI Components
  cupertino_icons: ^1.0.2
  flutter_slidable: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Notifications
  flutter_local_notifications: ^20.0.0
  
  # Audio
  audioplayers: ^5.2.1
  
  # Path Provider
  path_provider: ^2.1.0
  
  # Date/Time
  intl: ^0.18.1
  
  # Charts
  fl_chart: ^0.66.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # Firebase Authentication - NEW
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.1
  
  # Google Sign In - NEW (optional)
  google_sign_in: ^6.2.2
  
  # Email validation - NEW
  email_validator: ^2.1.17
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  # Add custom sounds
  assets:
    - assets/sounds/
    - assets/images/